
server.port=8080
server.address=0.0.0.0
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8

# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/tourism_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.swu.tourismmanagesystem.entity.**
mybatis.configuration.map-underscore-to-camel-case=true
logging.level.com.swu.tourismmanagesystem.mapper=debug

# login
login.username-min-length=2
login.password-min-length=6
login.max-login-fail-count=5
login.lock-minutes=15

# JWT
login.jwt.secret=tourism-manage-system-jwt-secret-key-2025
login.jwt.expire-hours=2
login.jwt.token-header=Authorization
login.jwt.token-prefix=Bearer

# password
login.password.encoder-strength=10